{% extends "base.html" %}
{% block title %}Log in — Abilene Axe League{% endblock %}
{% block content %}
<div class="auth-card">
  <h1 class="page-title">Log in</h1>
  {% if error %}<div class="form-error">{{ error }}</div>{% endif %}

  <form method="post" action="{{ url_for('login', next=next) }}" class="auth-form" id="login-form">
    <input type="hidden" name="role" id="role-input" value="">
    <div class="role-buttons">
      <button type="button" class="role-btn" data-role="admin">
        Admin
        <span class="muted-small">Full access</span>
      </button>
      <button type="button" class="role-btn" data-role="scorekeeper">
        Scorekeeper
        <span class="muted-small">Score and edit matches</span>
      </button>
      <button type="submit" class="role-btn" id="viewer-btn">
        View Games &amp; Stats
        <span class="muted-small">No password needed</span>
      </button>
    </div>

    <div id="pw-field" style="display:none">
      <label>Password
        <input type="password" name="password" id="pw-input" autocomplete="current-password">
      </label>
      <button type="submit" class="primary">Enter</button>
    </div>
  </form>
</div>
<script>
  const roleInput = document.getElementById("role-input");
  const pwField = document.getElementById("pw-field");
  const pwInput = document.getElementById("pw-input");

  document.querySelectorAll(".role-btn[data-role]").forEach(btn => {
    btn.addEventListener("click", () => {
      roleInput.value = btn.dataset.role;
      document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      pwField.style.display = "";
      pwInput.required = true;
      pwInput.focus();
    });
  });

  document.getElementById("viewer-btn").addEventListener("click", () => {
    roleInput.value = "viewer";
    pwInput.required = false;
  });
</script>
{% endblock %}
