<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Abilene Axe League{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ url_for('index') }}">
    <span class="brand-axe">🪓</span> ABILENE <em>AXE</em> LEAGUE
  </a>
  {% block nav %}{% endblock %}
  {% if role %}
  <div class="who">
    <span class="role-badge {{ role }}">{{ {'admin':'Admin','scorekeeper':'Scorekeeper','viewer':'Viewing'}[role] }}</span>
    <form method="post" action="{{ url_for('logout') }}" class="inline">
      <button type="submit" class="ghost tiny">Log out</button>
    </form>
  </div>
  {% endif %}
</header>
<main class="wrap">
{% block content %}{% endblock %}
</main>
</body>
</html>
